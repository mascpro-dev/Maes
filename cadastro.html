<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CONTA MÃE — Cadastro (1/3)</title>
  <meta name="description"
    content="Primeiro passo: dados da mãe — Aura, suporte materno com segurança e acolhimento." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="cadastro.css" />
  <link rel="stylesheet" href="cadastro-fluxo.css" />
  <link rel="icon" href="assets/branding/favicon.svg" type="image/svg+xml" sizes="any" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/branding/logohorizontal.svg" />
  <meta name="theme-color" content="#7a9e7e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CONTA MÃE" />
</head>

<body>

  <div class="cadastro-shell">

    <header class="cadastro-header" role="banner">
      <a href="login.html" class="cadastro-header__brand" aria-label="CONTA MÃE — início">
        <img src="assets/branding/logohorizontal.svg" alt="CONTA MÃE" width="56" height="56" decoding="async" />
      </a>
      <div class="fluxo-progress" data-step="1" aria-label="Cadastro: passo 1 de 3">
        <div class="fluxo-progress__track" role="presentation">
          <div class="fluxo-progress__fill"></div>
        </div>
      </div>
      <p class="fluxo-hint">Passo 1 de 3 — Dados da mãe</p>
      <h1 class="cadastro-title">Vamos começar sua jornada</h1>
    </header>

    <main class="cadastro-main" role="main">
      <div class="signup-msg signup-msg--error" id="signup-error" role="alert" hidden></div>

      <form class="cadastro-form" id="form-cadastro" novalidate>

        <div class="field">
          <label class="field__label" for="nome-completo">Nome completo</label>
          <input class="field__input" type="text" id="nome-completo" name="nome_completo" autocomplete="name" required
            placeholder="Como você gostaria de ser chamada" />
        </div>

        <div class="field">
          <label class="field__label" for="email">E-mail</label>
          <input class="field__input" type="email" id="email" name="email" autocomplete="email" required
            inputmode="email" placeholder="seu@email.com" />
        </div>

        <div class="field">
          <label class="field__label" for="telefone">Telefone</label>
          <input class="field__input" type="tel" id="telefone" name="telefone" autocomplete="tel"
            inputmode="tel" placeholder="(00) 00000-0000" />
        </div>

        <div class="field">
          <label class="field__label" for="senha">Criar senha</label>
          <input class="field__input" type="password" id="senha" name="senha" autocomplete="new-password" required
            minlength="10" maxlength="128"
            pattern="^(?=.*[A-Za-zÀ-ÿ])(?=.*\d).{10,}$"
            title="Mínimo 10 caracteres, com pelo menos uma letra e um número."
            placeholder="Mín. 10 caracteres, letras e números" />
        </div>

        <div class="field field--checkbox">
          <label class="checkbox-label">
            <input class="checkbox-input" type="checkbox" name="termos" id="termos" required value="1" />
            <span class="checkbox-box" aria-hidden="true"></span>
            <span class="checkbox-text">
              Li e aceito os
              <a href="#" class="inline-link">Termos de Uso</a>
              e
              <a href="#" class="inline-link">Política de Privacidade (LGPD)</a>.
            </span>
          </label>
        </div>

        <button type="submit" class="btn-proximo" id="btn-submit">Continuar</button>
      </form>

      <p class="login-footer-text" style="margin-top:24px;text-align:center;font-size:0.9rem;color:#5a5550;">
        Já tem conta? <a href="login.html" class="inline-link" style="font-weight:600">Entrar</a>
      </p>
    </main>
  </div>

  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script type="module">
    import { getSignupClient, signupStep1Mother } from './signup-flow.js';

    const form = document.getElementById('form-cadastro');
    const errEl = document.getElementById('signup-error');
    const btn = document.getElementById('btn-submit');

    function showSignupMessage(msg, kind = 'error') {
      errEl.textContent = msg;
      errEl.hidden = false;
      errEl.classList.toggle('signup-msg--error', kind === 'error');
      errEl.classList.toggle('signup-msg--warn', kind === 'warn');
    }

    function clearError() {
      errEl.hidden = true;
      errEl.textContent = '';
      errEl.classList.remove('signup-msg--error', 'signup-msg--warn');
    }

    const { client, error: cfgErr } = getSignupClient();
    if (cfgErr) {
      showSignupMessage(cfgErr + ' Depois disso, recarrega a página.');
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      clearError();
      if (!form.reportValidity()) return;

      if (!client) {
        showSignupMessage('Supabase não configurado. Define AURA_SUPABASE_URL e AURA_SUPABASE_ANON_KEY em supabase-config.js.');
        return;
      }

      const nome = document.getElementById('nome-completo').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('telefone').value.trim();
      const senha = document.getElementById('senha').value;

      btn.disabled = true;
      const res = await signupStep1Mother({
        fullName: nome,
        email,
        phone,
        password: senha,
      });
      btn.disabled = false;

      if (!res.ok) {
        showSignupMessage(res.message, res.code === 'EMAIL_CONFIRM' ? 'warn' : 'error');
        return;
      }

      window.location.href = 'cadastro-passo2.html';
    });
  </script>
  <script src="pwa.js"></script>
</body>

</html>
