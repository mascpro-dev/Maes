<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CONTA MÃE — Indicação</title>
  <meta name="description"
    content="Entra no Conta Mãe com o convite de uma mãe da comunidade — cadastro e acolhimento." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../cadastro.css" />
  <link rel="stylesheet" href="../cadastro-fluxo.css" />
  <link rel="icon" href="../assets/branding/favicon.svg" type="image/svg+xml" sizes="any" />
  <meta name="theme-color" content="#7a9e7e" />
  <script>
    (function () {
      try {
        var p = new URLSearchParams(window.location.search);
        var ref = (p.get('ref') || p.get('code') || '').trim();
        if (ref) sessionStorage.setItem('aura_signup_ref_code', ref);
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>

<body>
  <div class="cadastro-shell">
    <header class="cadastro-header" role="banner">
      <a href="../login.html" class="cadastro-header__brand" aria-label="CONTA MÃE">
        <img src="../assets/branding/logohorizontal.svg" alt="CONTA MÃE" width="260" height="49" decoding="async" />
      </a>
      <h1 class="cadastro-title" style="margin-top: 8px;">Bem-vinda ao Conta Mãe</h1>
      <p class="fluxo-hint" style="max-width: 28rem; margin-left: auto; margin-right: auto;">
        Chegaste por um <strong>link de indicação</strong>. Cria a tua conta para entrares na comunidade, na agenda e no
        apoio feito para mães atípicas.
      </p>
    </header>

    <main class="cadastro-main" role="main" style="padding-bottom: 32px;">
      <p id="indicacao-ref-note" class="fluxo-hint" style="max-width: 22rem; margin: 0 auto 20px; color: #5a7d5e;"
        hidden></p>

      <div style="display: flex; flex-direction: column; gap: 14px; max-width: 20rem; margin: 0 auto; align-items: stretch;">
        <a href="../cadastro.html" class="btn-proximo" style="text-align: center; text-decoration: none; display: block;">Criar
          conta</a>
        <a href="../login.html" class="inline-link"
          style="text-align: center; font-weight: 600; font-size: 0.9rem;">Já tenho conta — entrar</a>
      </div>
    </main>
  </div>
  <script>
    (function () {
      var raw = '';
      try {
        raw = sessionStorage.getItem('aura_signup_ref_code') || '';
      } catch (e) { }
      var el = document.getElementById('indicacao-ref-note');
      if (el && raw) {
        el.hidden = false;
        el.textContent = 'Código de convite guardado para o teu registo.';
      }
    })();
  </script>
  <script src="../pwa.js"></script>
</body>

</html>
