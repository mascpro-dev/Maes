<!DOCTYPE html>
<html lang="pt-BR" class="indicacao-page">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CONTA MÃE — Indicação</title>
  <meta name="description"
    content="Entra no Conta Mãe com o convite de uma mãe da comunidade — cadastro e acolhimento." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../cadastro.css" />
  <link rel="stylesheet" href="../cadastro-fluxo.css" />
  <link rel="stylesheet" href="../indicacao.css" />
  <link rel="icon" href="../assets/branding/favicon.svg" type="image/svg+xml" sizes="any" />
  <meta name="theme-color" content="#7a9e7e" />
  <script>
    (function () {
      try {
        var p = new URLSearchParams(window.location.search);
        var ref = (p.get('ref') || p.get('code') || '').trim();
        if (ref) sessionStorage.setItem('aura_signup_ref_code', ref);
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>

<body class="indicacao-page">
  <div class="cadastro-shell">
    <header class="cadastro-header" role="banner">
      <a href="../login.html" class="cadastro-header__brand" aria-label="CONTA MÃE">
        <img src="../assets/branding/logohorizontal.svg" alt="CONTA MÃE" width="260" height="49" decoding="async" />
      </a>
      <div class="indicacao-hero">
        <h1 class="indicacao-hero__title">Bem-vinda ao Conta Mãe</h1>
        <p class="indicacao-hero__lead">
          Chegaste por um <strong>link de indicação</strong>. Cria a tua conta para entrares na comunidade, na agenda e no
          apoio feito para mães atípicas.
        </p>
      </div>
    </header>

    <main class="cadastro-main indicacao-main" role="main">
      <p id="indicacao-ref-note" class="indicacao-ref-badge" hidden>Código de convite guardado para o teu registo.</p>

      <div class="indicacao-actions">
        <a href="../cadastro.html" class="btn-proximo">Criar conta</a>
        <a href="../login.html" class="indicacao-link-login">Já tenho conta — entrar</a>
      </div>
    </main>
  </div>
  <script>
    (function () {
      var raw = '';
      try {
        raw = sessionStorage.getItem('aura_signup_ref_code') || '';
      } catch (e) { }
      var el = document.getElementById('indicacao-ref-note');
      if (el) {
        if (raw) el.removeAttribute('hidden');
        else el.setAttribute('hidden', '');
      }
    })();
  </script>
  <script src="../pwa.js"></script>
</body>

</html>
