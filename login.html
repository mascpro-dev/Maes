<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CONTA MÃE — Entrar</title>
  <meta name="description" content="Acesse sua conta CONTA MÃE — suporte materno com acolhimento e organização." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet" />
  <link rel="icon" href="assets/branding/favicon.svg" type="image/svg+xml" sizes="any" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#7a9e7e" />
  <link rel="apple-touch-icon" href="assets/branding/logohorizontal.svg" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CONTA MÃE" />
  <link rel="stylesheet" href="login.css" />
</head>

<body>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>

  <div class="login-bg" aria-hidden="true"></div>

  <div class="login-shell">

    <main class="login-main" role="main">
      <div class="login-card">
        <header class="login-card__brand" role="banner">
          <p class="login-brand__eyebrow">Suporte materno</p>
          <div class="login-brand__logo-row">
            <a href="index.html" class="login-brand__logo-link" aria-label="CONTA MÃE — início">
              <img class="login-brand__logo-horizontal" src="assets/branding/logohorizontal.svg" alt="CONTA MÃE"
                width="280" height="52" decoding="async" />
            </a>
          </div>
          <div class="login-brand__rule" aria-hidden="true"></div>
          <p class="login-brand__tagline">Um espaço feito para você respirar, organizar e ser acolhida.</p>
          <p class="login-card__acesso">Acesse sua conta com segurança</p>
        </header>

        <form class="login-form" id="form-login" action="index.html" method="get">

          <div class="field field--icon">
            <label class="field__label" for="login-email">E-mail</label>
            <div class="field__control">
              <span class="field__icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.65"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                  <polyline points="22,6 12,13 2,6" />
                </svg>
              </span>
              <input class="field__input field__input--pill" type="email" id="login-email" name="email"
                autocomplete="email" required inputmode="email" placeholder="nome@email.com" />
            </div>
          </div>

          <div class="field field--icon field--password">
            <label class="field__label" for="login-senha">Senha</label>
            <div class="field__control field__control--password">
              <span class="field__icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.65"
                  stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
              </span>
              <input class="field__input field__input--pill field__input--with-toggle" type="password" id="login-senha"
                name="senha" autocomplete="current-password" required placeholder="Sua senha" />
              <button type="button" class="btn-toggle-visibility" data-target="login-senha" aria-label="Mostrar senha"
                aria-pressed="false">
                <svg class="icon-eye" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg class="icon-eye-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
          </div>

          <div class="login-row">
            <label class="login-remember">
              <input class="login-remember__input" type="checkbox" name="lembrar" value="1" />
              <span class="login-remember__box" aria-hidden="true"></span>
              <span>Lembrar neste dispositivo</span>
            </label>
            <a href="esqueci-senha.html" class="login-forgot">Esqueci minha senha</a>
          </div>

          <p class="login-password-hint" id="login-password-hint">A conta CONTA MÃE usa senha forte no registo (mínimo 10 caracteres, com letras e números).</p>

          <p class="login-error" id="login-error" role="alert" hidden></p>

          <button type="submit" class="btn-entrar">
            <span>Entrar</span>
            <svg class="btn-entrar__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
          </button>
        </form>
      </div>

      <p class="login-footer-text">
        Ainda não faz parte? <a href="cadastro-escolha.html" class="login-link">Criar uma conta</a>
      </p>
    </main>
  </div>

  <script>
    (function () {
      document.querySelectorAll('.btn-toggle-visibility').forEach(function (btn) {
        var id = btn.getAttribute('data-target');
        var input = document.getElementById(id);
        if (!input) return;
        var eye = btn.querySelector('.icon-eye');
        var eyeOff = btn.querySelector('.icon-eye-off');
        btn.addEventListener('click', function () {
          var show = input.type === 'password';
          input.type = show ? 'text' : 'password';
          btn.setAttribute('aria-pressed', show ? 'true' : 'false');
          btn.setAttribute('aria-label', show ? 'Ocultar senha' : 'Mostrar senha');
          if (eye) eye.hidden = show;
          if (eyeOff) eyeOff.hidden = !show;
        });
      });

      var form = document.getElementById('form-login');
      if (!form) return;
    })();
  </script>
  <script type="module" src="auth-login.js"></script>
  <script src="pwa.js"></script>
</body>

</html>
