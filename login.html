<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Aura — Entrar</title>
  <meta name="description" content="Acesse sua conta Aura — suporte materno com acolhimento e organização." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>

<body>
  <script src="auth.js"></script>
  <script>
    if (AuraAuth.isLoggedIn()) window.location.replace('index.html');
  </script>

  <div class="login-bg" aria-hidden="true"></div>

  <div class="login-shell">

    <header class="login-brand" role="banner">
      <p class="login-brand__eyebrow">Suporte materno</p>
      <h1 class="login-brand__logo">Aura</h1>
      <div class="login-brand__rule" aria-hidden="true"></div>
      <p class="login-brand__tagline">Um espaço feito para você respirar, organizar e ser acolhida.</p>
    </header>

    <main class="login-main" role="main">
      <div class="login-card">
        <div class="login-card__head">
          <h2 class="login-card__title">Entrar</h2>
          <p class="login-card__subtitle">Bem-vinda de volta — seus dados continuam seguros aqui.</p>
        </div>

        <form class="login-form" id="form-login" action="index.html" method="get">

          <div class="field">
            <label class="field__label" for="login-email">E-mail</label>
            <input class="field__input" type="email" id="login-email" name="email" autocomplete="email" required
              inputmode="email" placeholder="nome@email.com" />
          </div>

          <div class="field field--password">
            <label class="field__label" for="login-senha">Senha</label>
            <div class="password-wrap">
              <input class="field__input field__input--with-toggle" type="password" id="login-senha" name="senha"
                autocomplete="current-password" required placeholder="••••••••" />
              <button type="button" class="btn-toggle-visibility" data-target="login-senha" aria-label="Mostrar senha"
                aria-pressed="false">
                <svg class="icon-eye" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg class="icon-eye-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
          </div>

          <div class="login-row">
            <label class="login-remember">
              <input class="login-remember__input" type="checkbox" name="lembrar" value="1" />
              <span class="login-remember__box" aria-hidden="true"></span>
              <span>Lembrar neste dispositivo</span>
            </label>
            <a href="esqueci-senha.html" class="login-forgot">Esqueci minha senha</a>
          </div>

          <button type="submit" class="btn-entrar">
            <span>Entrar na Aura</span>
            <svg class="btn-entrar__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
          </button>
        </form>
      </div>

      <p class="login-footer-text">
        Ainda não faz parte? <a href="cadastro.html" class="login-link">Criar uma conta</a>
      </p>
    </main>
  </div>

  <script>
    (function () {
      document.querySelectorAll('.btn-toggle-visibility').forEach(function (btn) {
        var id = btn.getAttribute('data-target');
        var input = document.getElementById(id);
        if (!input) return;
        var eye = btn.querySelector('.icon-eye');
        var eyeOff = btn.querySelector('.icon-eye-off');
        btn.addEventListener('click', function () {
          var show = input.type === 'password';
          input.type = show ? 'text' : 'password';
          btn.setAttribute('aria-pressed', show ? 'true' : 'false');
          btn.setAttribute('aria-label', show ? 'Ocultar senha' : 'Mostrar senha');
          if (eye) eye.hidden = show;
          if (eyeOff) eyeOff.hidden = !show;
        });
      });

      var form = document.getElementById('form-login');
      if (!form) return;
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (!form.reportValidity()) return;
        var emailInput = document.getElementById('login-email');
        var email = (emailInput && emailInput.value.trim()) || '';
        var prev = AuraAuth.getProfile();
        var prevEmail = (prev.email && String(prev.email).toLowerCase()) || '';
        if (prevEmail && prevEmail !== email.toLowerCase()) {
          AuraAuth.saveProfile({ email: email, nomeCompleto: '' });
        } else {
          AuraAuth.saveProfile({ email: email });
        }
        var lembrar = form.querySelector('input[name="lembrar"]');
        AuraAuth.setLoggedIn(lembrar && lembrar.checked);
        window.location.href = 'index.html';
      });
    })();
  </script>
</body>

</html>
