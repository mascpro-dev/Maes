<!DOCTYPE html>
<html lang="pt-BR" class="aura-auth-checking">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONTA MÃE — Mensagens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/branding/favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#7a9e7e" />
  <link rel="apple-touch-icon" href="assets/branding/icon-192.svg" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CONTA MÃE" />
  <link rel="stylesheet" href="mensagens.css" />
</head>
<body>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script type="module" src="auth-session-guard.js"></script>

  <main class="dm-shell">
    <header class="dm-header">
      <div class="dm-header__side dm-header__side--left">
        <a href="feed.html" class="dm-link">← Feed</a>
      </div>
      <h1 class="dm-header__title">Mensagens</h1>
      <div class="dm-header__side dm-header__side--right">
        <a href="explorar.html" class="dm-link">Seguir</a>
      </div>
    </header>

    <section class="dm-layout">
      <aside class="dm-users">
        <h2>Conversar com</h2>
        <div id="dm-users-list"></div>
      </aside>

      <section class="dm-chat">
        <div id="dm-chat-title" class="dm-chat-title">Selecione uma conversa</div>
        <div id="dm-messages" class="dm-messages"></div>
        <div class="dm-send">
          <input id="dm-input" type="text" maxlength="2000" placeholder="Escreva uma mensagem..." />
          <button id="dm-send" type="button">Enviar</button>
        </div>
        <p id="dm-status" class="dm-status"></p>
      </section>
    </section>
  </main>

  <script type="module" src="mensagens.js"></script>
  <script src="pwa.js"></script>
</body>
</html>
