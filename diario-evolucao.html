<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Aura — Diário de Evolução Clínica</title>
  <meta name="description"
    content="Diário de evolução clínica: marcos, crises e relatório para o médico — Aura." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app-wrapper app-wrapper--diario">

    <header class="diario-header" role="banner">
      <a href="index.html" class="diario-header__back" aria-label="Voltar ao início">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12" />
          <polyline points="12 19 5 12 12 5" />
        </svg>
      </a>
      <div class="diario-header__titles">
        <p class="diario-header__eyebrow">Desenvolvimento infantil</p>
        <h1 class="diario-header__title">Diário de Evolução Clínica</h1>
      </div>
    </header>

    <!-- Seletor semanal horizontal -->
    <section class="diario-week" aria-label="Selecionar dia da semana">
      <div class="diario-week__toolbar">
        <button type="button" class="diario-week__nav" id="diario-week-prev" aria-label="Semana anterior">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <p class="diario-week__range" id="diario-week-label" aria-live="polite">—</p>
        <button type="button" class="diario-week__nav" id="diario-week-next" aria-label="Próxima semana">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6" />
          </svg>
        </button>
      </div>
      <div class="diario-week__strip" id="diario-week-strip" role="tablist" aria-label="Dias da semana"></div>
    </section>

    <!-- Gráfico -->
    <main class="diario-main" role="main">
      <section class="diario-chart-card" aria-labelledby="diario-chart-heading">
        <div class="diario-chart-card__head">
          <h2 id="diario-chart-heading" class="diario-chart-card__title">Visão da semana</h2>
          <p class="diario-chart-card__sub">Marcos alcançados e crises registradas (contagem por dia)</p>
        </div>
        <div class="diario-chart__legend" role="list">
          <span class="diario-chart__legend-item" role="listitem">
            <span class="diario-chart__dot diario-chart__dot--marcos" aria-hidden="true"></span>
            Marcos alcançados
          </span>
          <span class="diario-chart__legend-item" role="listitem">
            <span class="diario-chart__dot diario-chart__dot--crises" aria-hidden="true"></span>
            Crises
          </span>
        </div>
        <div class="diario-chart__plot">
          <svg class="diario-chart__svg" id="diario-chart-svg" viewBox="0 0 320 168" preserveAspectRatio="xMidYMid meet"
            aria-hidden="true">
            <defs>
              <linearGradient id="diario-fill-marcos" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#7a9e7e" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#7a9e7e" stop-opacity="0" />
              </linearGradient>
              <linearGradient id="diario-fill-crises" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#c47a5b" stop-opacity="0.14" />
                <stop offset="100%" stop-color="#c47a5b" stop-opacity="0" />
              </linearGradient>
            </defs>
            <!-- Grid horizontal -->
            <g class="diario-chart__grid" stroke="rgba(45,42,38,.08)" stroke-width="1">
              <line x1="36" y1="28" x2="304" y2="28" />
              <line x1="36" y1="58" x2="304" y2="58" />
              <line x1="36" y1="88" x2="304" y2="88" />
              <line x1="36" y1="118" x2="304" y2="118" />
              <line x1="36" y1="138" x2="304" y2="138" stroke="rgba(45,42,38,.12)" />
            </g>
            <g class="diario-chart__y-labels" fill="var(--ink-light)" font-size="9" font-family="var(--font-sans)">
              <text x="30" y="32" text-anchor="end">8</text>
              <text x="30" y="62" text-anchor="end">6</text>
              <text x="30" y="92" text-anchor="end">4</text>
              <text x="30" y="122" text-anchor="end">2</text>
              <text x="30" y="142" text-anchor="end">0</text>
            </g>
            <path id="diario-area-marcos" fill="url(#diario-fill-marcos)" />
            <path id="diario-area-crises" fill="url(#diario-fill-crises)" />
            <path id="diario-line-marcos" fill="none" stroke="#7a9e7e" stroke-width="2.25" stroke-linecap="round"
              stroke-linejoin="round" />
            <path id="diario-line-crises" fill="none" stroke="#c47a5b" stroke-width="2.25" stroke-linecap="round"
              stroke-linejoin="round" />
            <g id="diario-dots-marcos" fill="#7a9e7e" />
            <g id="diario-dots-crises" fill="#c47a5b" />
          </svg>
        </div>
      </section>
    </main>

    <!-- Backdrop menu FAB -->
    <div class="diario-fab-backdrop" id="diario-fab-backdrop" hidden aria-hidden="true"></div>

    <!-- Menu flutuante + -->
    <div class="diario-fab-stack" id="diario-fab-stack">
      <div class="diario-fab-menu" id="diario-fab-menu" role="menu" aria-label="Forma de registro" hidden>
        <button type="button" class="diario-fab-option" id="diario-opt-audio" role="menuitem">
          <span class="diario-fab-option__icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
          </span>
          <span class="diario-fab-option__text">Registrar por Áudio</span>
        </button>
        <button type="button" class="diario-fab-option" id="diario-opt-texto" role="menuitem">
          <span class="diario-fab-option__icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="8" y1="13" x2="16" y2="13" />
              <line x1="8" y1="17" x2="14" y2="17" />
            </svg>
          </span>
          <span class="diario-fab-option__text">Registrar por Texto</span>
        </button>
      </div>
      <button type="button" class="diario-fab" id="diario-fab" aria-expanded="false"
        aria-controls="diario-fab-menu" aria-haspopup="true" aria-label="Novo registro no diário">
        <svg class="diario-fab__icon diario-fab__icon--plus" width="26" height="26" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        <svg class="diario-fab__icon diario-fab__icon--close" width="26" height="26" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <!-- Rodapé: relatório médico -->
    <footer class="diario-report-bar" role="contentinfo">
      <button type="button" class="diario-report-btn" id="diario-btn-relatorio">
        <span class="diario-report-btn__icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" stroke="#7a9e7e"
              stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" />
            <polyline points="14 2 14 8 20 8" stroke="#7a9e7e" stroke-width="1.75" stroke-linecap="round"
              stroke-linejoin="round" />
            <path d="M9 15h6M9 11h6M9 19h4" stroke="#7a9e7e" stroke-width="1.75" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </span>
        <span class="diario-report-btn__label">Gerar Relatório para o Médico</span>
      </button>
    </footer>

    <nav class="bottom-nav" role="navigation" aria-label="Navegação principal">
      <a href="index.html" class="nav-btn" aria-label="Home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>Home</span>
      </a>
      <a href="community.html" class="nav-btn" aria-label="Comunidade">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <span>Comunidade</span>
      </a>
      <a href="diario-evolucao.html" class="nav-btn nav-btn--active" aria-label="Diário" aria-current="page">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        <span>Diário</span>
      </a>
      <button type="button" class="nav-btn" id="nav-profile" aria-label="Perfil">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span>Perfil</span>
      </button>
    </nav>
  </div>

  <script src="diario-evolucao.js"></script>
</body>

</html>
