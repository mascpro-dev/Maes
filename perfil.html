<!DOCTYPE html>
<html lang="pt-BR" class="aura-auth-checking">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura — Perfil</title>
  <meta name="description" content="O teu perfil Aura: dados da mãe e filhos registados." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="perfil.css" />
</head>

<body>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script type="module" src="auth-session-guard.js"></script>

  <div class="app-wrapper">
    <header class="perfil-topbar" role="banner">
      <a href="index.html" class="perfil-back" aria-label="Voltar ao início">← Início</a>
    </header>

    <main class="perfil-main" role="main">
      <p class="perfil-loading" id="perfil-loading">A carregar o teu perfil…</p>

      <div id="perfil-content" hidden>
        <div class="perfil-hero">
          <div class="perfil-hero__avatar" aria-hidden="true">
            <img id="perfil-avatar-img" alt="" width="96" height="96" hidden />
            <span class="perfil-hero__initials" id="perfil-avatar-initials">AU</span>
          </div>
          <h1 class="perfil-hero__name" id="perfil-name">—</h1>
          <p class="perfil-hero__email" id="perfil-email">—</p>
        </div>

        <section class="perfil-bio" aria-labelledby="perfil-bio-heading">
          <h2 class="perfil-bio__label" id="perfil-bio-heading">Bio</h2>
          <p class="perfil-bio__text perfil-bio__empty" id="perfil-bio-text"></p>
        </section>

        <section class="perfil-children" aria-labelledby="perfil-children-heading">
          <h2 class="perfil-section__title" id="perfil-children-heading">Filhos registados</h2>
          <div id="perfil-children-list"></div>
        </section>

        <div class="perfil-actions">
          <button type="button" class="btn-perfil-sair" id="btn-perfil-sair">Sair</button>
        </div>
      </div>
    </main>

    <nav class="bottom-nav" role="navigation" aria-label="Navegação principal">
      <a href="index.html" class="sidebar-brand" aria-label="Aura — início">
        <span class="sidebar-brand__mark" aria-hidden="true">
          <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="auraLogoGradPerfil" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#7a9e7e" />
                <stop offset="100%" stop-color="#c47a5b" />
              </linearGradient>
            </defs>
            <circle cx="22" cy="22" r="20" fill="url(#auraLogoGradPerfil)" />
            <path
              d="M22 12c-2.5 3.2-6 6.8-6 11.2a6 6 0 0 0 12 0c0-4.4-3.5-8-6-11.2Z"
              fill="rgba(255,254,248,.95)" />
            <circle cx="22" cy="26" r="2" fill="rgba(255,254,248,.9)" />
          </svg>
        </span>
        <span class="sidebar-brand__text">Aura</span>
      </a>
      <a href="index.html" class="nav-btn" id="nav-home" aria-label="Home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>Home</span>
      </a>
      <a href="community.html" class="nav-btn" id="nav-community" aria-label="Comunidade">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <span>Comunidade</span>
      </a>
      <a href="diario-evolucao.html" class="nav-btn" id="nav-diary" aria-label="Diário">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        <span>Diário</span>
      </a>
      <a href="perfil.html" class="nav-btn nav-btn--active" id="nav-profile" aria-label="Perfil" aria-current="page">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span>Perfil</span>
      </a>
    </nav>
  </div>

  <script type="module" src="perfil.js"></script>
</body>

</html>
